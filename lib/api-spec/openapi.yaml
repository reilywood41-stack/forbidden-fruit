openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Forbidden Fruit API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: content
    description: Content management
  - name: payments
    description: Payment processing
  - name: referrals
    description: Referral program
  - name: bookings
    description: Video call bookings
  - name: admin
    description: Admin operations
  - name: notifications
    description: Notifications

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Reset email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/profile:
    get:
      operationId: getProfile
      tags: [users]
      summary: Get user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateProfile
      tags: [users]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /content:
    get:
      operationId: getContent
      tags: [content]
      summary: Get content list
      parameters:
        - name: tier
          in: query
          schema:
            type: string
            enum: [free, bronze, silver, gold]
        - name: type
          in: query
          schema:
            type: string
            enum: [video, image, gallery]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: number
      responses:
        "200":
          description: Content list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentListResponse"

  /content/{id}:
    get:
      operationId: getContentById
      tags: [content]
      summary: Get content by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Content item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /content/{id}/comments:
    get:
      operationId: getComments
      tags: [content]
      summary: Get comments for content
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Comments list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentsListResponse"
    post:
      operationId: addComment
      tags: [content]
      summary: Add comment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCommentRequest"
      responses:
        "201":
          description: Comment added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /payments/submit:
    post:
      operationId: submitPayment
      tags: [payments]
      summary: Submit payment for approval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitPaymentRequest"
      responses:
        "201":
          description: Payment submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/my:
    get:
      operationId: getMyPayments
      tags: [payments]
      summary: Get my payment history
      responses:
        "200":
          description: Payment list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentListResponse"

  /referrals:
    get:
      operationId: getReferrals
      tags: [referrals]
      summary: Get my referrals
      responses:
        "200":
          description: Referral info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralInfo"

  /referrals/apply-promo:
    post:
      operationId: applyPromoCode
      tags: [referrals]
      summary: Apply promo code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyPromoRequest"
      responses:
        "200":
          description: Promo applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /bookings:
    get:
      operationId: getMyBookings
      tags: [bookings]
      summary: Get my bookings
      responses:
        "200":
          description: Bookings list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingListResponse"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create video call booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /models:
    get:
      operationId: getModels
      tags: [content]
      summary: Get available models
      responses:
        "200":
          description: Models list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelsListResponse"

  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get my notifications
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsListResponse"
    put:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /notifications/{id}/read:
    put:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/users:
    get:
      operationId: adminGetUsers
      tags: [admin]
      summary: Get all users
      parameters:
        - name: page
          in: query
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: number
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUsersListResponse"

  /admin/users/{id}:
    get:
      operationId: adminGetUser
      tags: [admin]
      summary: Get user details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetail"
    put:
      operationId: adminUpdateUser
      tags: [admin]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: adminDeleteUser
      tags: [admin]
      summary: Delete user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/payments:
    get:
      operationId: adminGetPayments
      tags: [admin]
      summary: Get payment queue
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: Payments list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPaymentListResponse"

  /admin/payments/{id}/approve:
    put:
      operationId: adminApprovePayment
      tags: [admin]
      summary: Approve payment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Payment approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/payments/{id}/reject:
    put:
      operationId: adminRejectPayment
      tags: [admin]
      summary: Reject payment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectPaymentRequest"
      responses:
        "200":
          description: Payment rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/content:
    get:
      operationId: adminGetContent
      tags: [admin]
      summary: Get all content
      responses:
        "200":
          description: Content list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentListResponse"
    post:
      operationId: adminCreateContent
      tags: [admin]
      summary: Create content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContentRequest"
      responses:
        "201":
          description: Content created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentItem"

  /admin/content/{id}:
    put:
      operationId: adminUpdateContent
      tags: [admin]
      summary: Update content
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContentRequest"
      responses:
        "200":
          description: Content updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentItem"
    delete:
      operationId: adminDeleteContent
      tags: [admin]
      summary: Delete content
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Content deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/bookings:
    get:
      operationId: adminGetBookings
      tags: [admin]
      summary: Get all bookings
      responses:
        "200":
          description: Bookings list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBookingListResponse"

  /admin/bookings/{id}/status:
    put:
      operationId: adminUpdateBookingStatus
      tags: [admin]
      summary: Update booking status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookingStatusRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/notifications/send:
    post:
      operationId: adminSendNotification
      tags: [admin]
      summary: Send push notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendNotificationRequest"
      responses:
        "200":
          description: Notification sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/analytics:
    get:
      operationId: adminGetAnalytics
      tags: [admin]
      summary: Get analytics data
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsResponse"

  /admin/models:
    post:
      operationId: adminCreateModel
      tags: [admin]
      summary: Create a model profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateModelRequest"
      responses:
        "201":
          description: Model created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Model"

  /admin/models/{id}:
    put:
      operationId: adminUpdateModel
      tags: [admin]
      summary: Update model
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateModelRequest"
      responses:
        "200":
          description: Model updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Model"
    delete:
      operationId: adminDeleteModel
      tags: [admin]
      summary: Delete model
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Model deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
        username:
          type: string
        password:
          type: string
        referralCode:
          type: string
      required: [email, username, password]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
      required: [email]

    ResetPasswordRequest:
      type: object
      properties:
        token:
          type: string
        password:
          type: string
      required: [token, password]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    User:
      type: object
      properties:
        id:
          type: number
        email:
          type: string
        username:
          type: string
        displayName:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        membershipTier:
          type: string
          enum: [none, bronze, silver, gold]
        membershipExpiry:
          type: string
          nullable: true
        isAdmin:
          type: boolean
        isEmailVerified:
          type: boolean
        referralCode:
          type: string
        referralCount:
          type: number
        createdAt:
          type: string
      required: [id, email, username, membershipTier, isAdmin, isEmailVerified, referralCode, referralCount, createdAt]

    UserProfile:
      type: object
      properties:
        id:
          type: number
        email:
          type: string
        username:
          type: string
        displayName:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        membershipTier:
          type: string
          enum: [none, bronze, silver, gold]
        membershipExpiry:
          type: string
          nullable: true
        referralCode:
          type: string
        referralCount:
          type: number
        createdAt:
          type: string
      required: [id, email, username, membershipTier, referralCode, referralCount, createdAt]

    UpdateProfileRequest:
      type: object
      properties:
        displayName:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string

    ContentItem:
      type: object
      properties:
        id:
          type: number
        title:
          type: string
        description:
          type: string
          nullable: true
        type:
          type: string
          enum: [video, image, gallery]
        tier:
          type: string
          enum: [free, bronze, silver, gold]
        thumbnailUrl:
          type: string
          nullable: true
        videoUrl:
          type: string
          nullable: true
        imageUrls:
          type: array
          items:
            type: string
        modelId:
          type: number
          nullable: true
        modelName:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        duration:
          type: number
          nullable: true
        viewCount:
          type: number
        commentCount:
          type: number
        boostedLikes:
          type: number
        isLocked:
          type: boolean
        createdAt:
          type: string
      required: [id, title, type, tier, imageUrls, tags, viewCount, commentCount, isLocked, createdAt]

    ContentListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ContentItem"
        total:
          type: number
        page:
          type: number
        limit:
          type: number
        totalPages:
          type: number
      required: [items, total, page, limit, totalPages]

    Comment:
      type: object
      properties:
        id:
          type: number
        contentId:
          type: number
        userId:
          type: number
        username:
          type: string
        avatarUrl:
          type: string
          nullable: true
        text:
          type: string
        createdAt:
          type: string
      required: [id, contentId, userId, username, text, createdAt]

    CommentsListResponse:
      type: object
      properties:
        comments:
          type: array
          items:
            $ref: "#/components/schemas/Comment"
        total:
          type: number
      required: [comments, total]

    AddCommentRequest:
      type: object
      properties:
        text:
          type: string
      required: [text]

    Payment:
      type: object
      properties:
        id:
          type: number
        userId:
          type: number
        method:
          type: string
          enum: [cashapp, giftcard]
        membershipTier:
          type: string
          enum: [bronze, silver, gold]
        subscriptionAddon:
          type: string
          nullable: true
          enum: [weekly, monthly, annual, null]
        amount:
          type: number
        screenshotUrl:
          type: string
          nullable: true
        giftCardImageUrl:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, approved, rejected]
        adminNote:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, userId, method, membershipTier, amount, status, createdAt]

    SubmitPaymentRequest:
      type: object
      properties:
        method:
          type: string
          enum: [cashapp, giftcard]
        membershipTier:
          type: string
          enum: [bronze, silver, gold]
        subscriptionAddon:
          type: string
          nullable: true
          enum: [weekly, monthly, annual]
        amount:
          type: number
        screenshotUrl:
          type: string
        giftCardImageUrl:
          type: string
      required: [method, membershipTier, amount]

    PaymentListResponse:
      type: object
      properties:
        payments:
          type: array
          items:
            $ref: "#/components/schemas/Payment"
        total:
          type: number
      required: [payments, total]

    ReferralInfo:
      type: object
      properties:
        referralCode:
          type: string
        referralCount:
          type: number
        referralLink:
          type: string
        referredUsers:
          type: array
          items:
            type: object
            properties:
              username:
                type: string
              joinedAt:
                type: string
              isPaying:
                type: boolean
            required: [username, joinedAt, isPaying]
        goalProgress:
          type: number
        nextReward:
          type: string
      required: [referralCode, referralCount, referralLink, referredUsers, goalProgress, nextReward]

    ApplyPromoRequest:
      type: object
      properties:
        code:
          type: string
      required: [code]

    Model:
      type: object
      properties:
        id:
          type: number
        name:
          type: string
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        isAvailableForCalls:
          type: boolean
        callRates:
          type: object
          properties:
            fifteenMin:
              type: number
            thirtyMin:
              type: number
            sixtyMin:
              type: number
          required: [fifteenMin, thirtyMin, sixtyMin]
        createdAt:
          type: string
      required: [id, name, isAvailableForCalls, callRates, createdAt]

    ModelsListResponse:
      type: object
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/Model"
      required: [models]

    Booking:
      type: object
      properties:
        id:
          type: number
        userId:
          type: number
        modelId:
